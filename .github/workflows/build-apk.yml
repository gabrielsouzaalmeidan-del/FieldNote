name: Build APK - FieldNote

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Gerar APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Preparar pasta www
        run: |
          mkdir -p www
          cp index.html www/index.html
          npm install xlsx --no-save --silent 2>/dev/null || true
          cp node_modules/xlsx/dist/xlsx.full.min.js www/xlsx.full.min.js 2>/dev/null || true
          sed -i 's|src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/[^"]*"|src="xlsx.full.min.js"|g' www/index.html
          ls -lah www/

      - name: Instalar Capacitor
        run: npm install

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar arquivos
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Instalar ícone personalizado
        run: |
          if [ ! -f "icon.png" ]; then
            echo "icon.png não encontrado — pulando"
            exit 0
          fi

          pip install Pillow --break-system-packages -q

          # Remover ícones XML adaptativos que sobrescrevem os PNGs
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete
          find android/app/src/main/res -name "ic_launcher_round.xml" -delete
          find android/app/src/main/res -name "*.xml" -path "*/mipmap*" -delete
          echo "XMLs adaptativos removidos"

          python3 << 'PYEOF'
          from PIL import Image
          import os

          img = Image.open("icon.png").convert("RGBA")
          print(f"Ícone fonte: {img.size}")

          targets = {
              "android/app/src/main/res/mipmap-mdpi/ic_launcher.png":          48,
              "android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png":    48,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher.png":          72,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png":    72,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher.png":         96,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png":   96,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png":       144,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png": 144,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png":      192,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png":192,
          }

          for path, size in targets.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img.resize((size, size), Image.LANCZOS).save(path, "PNG")
              print(f"OK {size}px → {path}")

          print("Ícones PNG instalados!")
          PYEOF

          echo "=== Ícones instalados ===" && find android/app/src/main/res/mipmap* -name "*.png" | sort

      - name: Substituir AndroidManifest com permissões completas
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:name=".MainActivity"
                      android:theme="@style/AppTheme.NoActionBarLaunch">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

                  <provider
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true"
                      android:name="androidx.core.content.FileProvider">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

              </application>

          </manifest>
          XMLEOF
          echo "=== Permissões ===" && grep "permission" android/app/src/main/AndroidManifest.xml

      - name: Corrigir nome no strings.xml
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">FieldNote</string>|g' \
            android/app/src/main/res/values/strings.xml
          echo "=== strings.xml ===" && cat android/app/src/main/res/values/strings.xml

      - name: Adicionar suporte a download de arquivos no WebView
        run: |
          MAIN_DIR="android/app/src/main/java/br/com/fieldnote/app"
          mkdir -p "$MAIN_DIR"
          cp android-src/MainActivity.java "$MAIN_DIR/MainActivity.java"
          echo "=== MainActivity.java instalado ==="
          wc -l "$MAIN_DIR/MainActivity.java"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Renomear APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk              android/app/build/outputs/apk/debug/FieldNote.apk
          echo "APK renomeado para FieldNote.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: FieldNote-APK
          path: android/app/build/outputs/apk/debug/FieldNote.apk
          retention-days: 30

      - name: Criar Release
        run: |
          APK="android/app/build/outputs/apk/debug/FieldNote.apk"
          ls -lh "$APK" || { echo "::error::APK nao encontrado: $APK"; exit 1; }
          gh release delete "build-${{ github.run_number }}" \
            --repo "${{ github.repository }}" --yes 2>/dev/null || true
          GH_OUT=$(gh release create "build-${{ github.run_number }}" "$APK" \
            --repo "${{ github.repository }}" \
            --title "FieldNote Build ${{ github.run_number }}" \
            --notes "FieldNote APK Android - Build ${{ github.run_number }}" 2>&1) \
            || { echo "::error::gh release create falhou: $GH_OUT"; exit 1; }
          echo "Release criado: $GH_OUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
